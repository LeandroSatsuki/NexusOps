services:
  postgres:
    image: postgres:16-alpine
    container_name: nexusops-postgres
    environment:
      POSTGRES_USER: nexusops
      POSTGRES_PASSWORD: nexusops_dev_password
      POSTGRES_DB: nexusops
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusops -d nexusops"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexusops-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nexusops-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nexusops:nexusops_dev_password@postgres:5432/nexusops?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: nexusops-web
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3333
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:

